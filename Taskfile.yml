version: '3'

dotenv: ['.env']

vars:
  PROTO_FILE: "proto/nakama-types.proto"
  PROTO_SERVICE_FILE: "proto/nakama-api.proto"
  PROTO_RT_FILE: "proto/realtime.proto"
  CODEGEN: 'build/codegen{{if eq OS "windows"}}.exe{{end}}'

tasks:

  fetch-protos:
    desc: 'Fetch .proto files from Nakama.'
    cmds:
    - cmd: mkdir proto
      ignore_error: true
    - cmd: |
        curl -o {{.PROTO_SERVICE_FILE}} https://raw.githubusercontent.com/heroiclabs/nakama/feat/flatten-proto/apigrpc/apigrpc.proto
        curl -o {{.PROTO_FILE}} https://raw.githubusercontent.com/heroiclabs/nakama-common/feat/flatten-proto-v2/api/api.proto
        curl -o {{.PROTO_RT_FILE}} https://raw.githubusercontent.com/heroiclabs/nakama-common/feat/flatten-proto-v2/rtapi/realtime.proto

  run-codegen:
    desc: 'Fetch Nakama proto schemas and run codegen.'
    vars:
      TEMPLATE_FILE: cmd/codegen/templates/debug.tmpl
    cmds:
    - task: fetch-protos
    - cmd: ./{{.CODEGEN}} --template {{.TEMPLATE_FILE}} --proto {{.PROTO_FILE}} --proto {{.PROTO_SERVICE_FILE}} --proto {{.PROTO_RT_FILE}}

  run-codegen-file:
    desc: 'Fetch Nakama proto schemas and run codegen to file.'
    vars:
      TEMPLATE_FILE: cmd/codegen/templates/debug.tmpl
      OUTPUT_FILE: build/codegen.out
    cmds:
    - task: fetch-protos
    - cmd: ./{{.CODEGEN}} --template {{.TEMPLATE_FILE}} --proto {{.PROTO_FILE}} --proto {{.PROTO_SERVICE_FILE}} > {{.OUTPUT_FILE}}


  link-nakama-plugin:
    desc: 'Link Nakama plugin into NakamaTest.'
    cmds:
    - cmd: |
        powershell -NoProfile -Command "& {
          New-Item -ItemType Directory -Force -Path 'NakamaTest\Plugins' | Out-Null
          New-Item -ItemType Junction -Force -Path 'NakamaTest\Plugins\Nakama' -Target (Join-Path (Get-Location) 'Nakama')
        }"
      platforms: [windows]
    - cmd: |
        mkdir -p "NakamaTest/Plugins"
        ln -sfn "$(pwd)/Nakama" "NakamaTest/Plugins/Nakama"
      platforms: [darwin, linux]

  start-nakama:
    desc: 'Start Nakama server with PostgreSQL via Docker Compose.'
    cmds:
    - cmd: |
        echo "Stopping any existing containers..."
        docker compose -f NakamaTest/nakama-server/docker-compose.yml down -v 2>/dev/null || true
        docker rm -f nakama_unreal_test_nakama nakama_unreal_test_postgres 2>/dev/null || true
        echo "Starting Nakama server..."
        docker compose -f NakamaTest/nakama-server/docker-compose.yml up -d
        echo "Waiting for Nakama to be healthy..."
        timeout=60
        while [ $timeout -gt 0 ]; do
          if docker exec nakama_unreal_test_nakama /nakama/nakama healthcheck 2>/dev/null; then
            echo "Nakama is ready!"
            exit 0
          fi
          sleep 2
          timeout=$((timeout - 2))
        done
        echo "Error: Nakama failed to start within 60 seconds"
        docker compose -f NakamaTest/nakama-server/docker-compose.yml logs nakama
        exit 1
      platforms: [darwin, linux]
    - cmd: |
        powershell -NoProfile -Command "& {
          Write-Host 'Stopping any existing containers...'
          docker compose -f NakamaTest/nakama-server/docker-compose.yml down -v 2>&1 | Out-Null
          docker rm -f nakama_unreal_test_nakama nakama_unreal_test_postgres 2>&1 | Out-Null
          Write-Host 'Starting Nakama server...'
          docker compose -f NakamaTest/nakama-server/docker-compose.yml up -d
          Write-Host 'Waiting for Nakama to be healthy...'
          \$timeout = 60
          while (\$timeout -gt 0) {
            \$result = docker exec nakama_unreal_test_nakama /nakama/nakama healthcheck 2>&1
            if (\$LASTEXITCODE -eq 0) {
              Write-Host 'Nakama is ready!'
              exit 0
            }
            Start-Sleep -Seconds 2
            \$timeout -= 2
          }
          Write-Host 'Error: Nakama failed to start within 60 seconds'
          docker compose -f NakamaTest/nakama-server/docker-compose.yml logs nakama
          exit 1
        }"
      platforms: [windows]

  stop-nakama:
    desc: 'Stop Nakama server and remove volumes.'
    cmds:
    - cmd: docker compose -f NakamaTest/nakama-server/docker-compose.yml down -v
      platforms: [darwin, linux]
    - cmd: docker compose -f NakamaTest/nakama-server/docker-compose.yml down -v
      platforms: [windows]

  build-plugin:
    desc: 'Build the Nakama plugin as a packaged plugin.'
    deps:
    - task: check-unreal-engine
    vars:
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "Out/Nakama"}}'
    cmds:
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi

        PLUGIN="$(pwd)/Nakama/Nakama.uplugin"
        OUTPUT="$(pwd)/{{.OUTPUT_DIR}}"

        echo "Building Nakama plugin → $OUTPUT..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.bat" \
            BuildPlugin -NoHostPlatform \
            -Plugin="$PLUGIN" \
            -TargetPlatforms=Win64 \
            -package="$OUTPUT"
      platforms: [windows]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi

        PLUGIN="$(pwd)/Nakama/Nakama.uplugin"
        OUTPUT="$(pwd)/{{.OUTPUT_DIR}}"

        echo "Building Nakama plugin → $OUTPUT..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.sh" \
            BuildPlugin -NoHostPlatform \
            -Plugin="$PLUGIN" \
            -TargetPlatforms=Mac \
            -package="$OUTPUT" \
            -Architecture_Mac=arm64
      platforms: [darwin]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi

        PLUGIN="$(pwd)/Nakama/Nakama.uplugin"
        OUTPUT="$(pwd)/{{.OUTPUT_DIR}}"

        echo "Building Nakama plugin → $OUTPUT..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.sh" \
            BuildPlugin -NoHostPlatform \
            -Plugin="$PLUGIN" \
            -TargetPlatforms=Linux \
            -package="$OUTPUT"
      platforms: [linux]

  build-project:
    desc: 'Build and cook a project via UAT (BuildCookRun).'
    deps:
    - task: check-unreal-engine
    vars:
      PROJECT: '{{.PROJECT}}'
      CONFIG: '{{.CONFIG | default "Development"}}'
    cmds:
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi
        if [ -z "{{.PROJECT}}" ]; then
            echo "Error: PROJECT is required. Example:"
            echo "  task build-project PROJECT=NakamaBlueprintsDemo/NakamaBlueprintsDemo.uproject"
            exit 1
        fi

        PROJECT="$(pwd)/{{.PROJECT}}"

        echo "Building project $PROJECT ({{.CONFIG}})..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.bat" \
            BuildCookRun \
            -Platform=Win64 \
            -Project="$PROJECT" \
            -ClientConfig={{.CONFIG}} \
            -Cook -Build
      platforms: [windows]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi
        if [ -z "{{.PROJECT}}" ]; then
            echo "Error: PROJECT is required. Example:"
            echo "  task build-project PROJECT=NakamaBlueprintsDemo/NakamaBlueprintsDemo.uproject"
            exit 1
        fi

        PROJECT="$(pwd)/{{.PROJECT}}"

        echo "Building project $PROJECT ({{.CONFIG}})..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.sh" \
            BuildCookRun \
            -Platform=Mac \
            -Project="$PROJECT" \
            -ClientConfig={{.CONFIG}} \
            -Cook -Build \
            -Architecture_Mac=arm64
      platforms: [darwin]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi
        if [ -z "{{.PROJECT}}" ]; then
            echo "Error: PROJECT is required. Example:"
            echo "  task build-project PROJECT=NakamaBlueprintsDemo/NakamaBlueprintsDemo.uproject"
            exit 1
        fi

        PROJECT="$(pwd)/{{.PROJECT}}"

        echo "Building project $PROJECT ({{.CONFIG}})..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.sh" \
            BuildCookRun \
            -Platform=Linux \
            -Project="$PROJECT" \
            -ClientConfig={{.CONFIG}} \
            -Cook -Build
      platforms: [linux]

  package-nakamatest:
    desc: 'Package NakamaTest as a standalone build (BuildCookRun).'
    deps:
    - task: check-unreal-engine
    - task: link-nakama-plugin
    cmds:
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi

        PROJECT="$(pwd)/NakamaTest/NakamaTest.uproject"

        echo "Packaging NakamaTest..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.bat" \
            BuildCookRun \
            -targetconfig=Debug \
            -project="$PROJECT" \
            -noP4 -installed -utf8output \
            -build -cook -stage -package \
            -verbose -stdout -nohostplatform -useshellexecute
      platforms: [windows]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi

        PROJECT="$(pwd)/NakamaTest/NakamaTest.uproject"

        echo "Packaging NakamaTest..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.sh" \
            BuildCookRun \
            -project="$PROJECT" \
            -targetConfig=Debug \
            -noP4 -platform=Mac -Architecture_Mac=arm64 \
            -installed -unrealexe=UnrealEditor -utf8output \
            -build -cook -stage -package -verbose
      platforms: [darwin]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi

        PROJECT="$(pwd)/NakamaTest/NakamaTest.uproject"

        echo "Packaging NakamaTest..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.sh" \
            BuildCookRun \
            -project="$PROJECT" \
            -clientconfig=Test \
            -noP4 -platform=Linux -targetconfig=Debug \
            -installed -utf8output \
            -build -cook -stage -package -verbose
      platforms: [linux]

  build-nakamatest:
    desc: 'Build NakamaTest project only (no server start).'
    deps:
    - task: check-unreal-engine
    - task: link-nakama-plugin
    cmds:
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi

        PROJECT="$(pwd)/NakamaTest/NakamaTest.uproject"

        echo "Building NakamaTest..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/Build.bat" \
            NakamaTestEditor Win64 Development \
            -Project="$PROJECT"
      platforms: [windows]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi

        PROJECT="$(pwd)/NakamaTest/NakamaTest.uproject"

        echo "Building NakamaTest..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/Mac/Build.sh" \
            NakamaTestEditor Mac Development \
            -Project="$PROJECT"
      platforms: [darwin]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi

        PROJECT="$(pwd)/NakamaTest/NakamaTest.uproject"

        echo "Building NakamaTest..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/Linux/Build.sh" \
            NakamaTestEditor Linux Development \
            -Project="$PROJECT"
      platforms: [linux]

  test-unreal:
    desc: 'Build and run NakamaTest C++ automation suite.'
    vars:
      TEST_SUITE: '{{.TEST_SUITE | default "NakamaTest.Auth"}}'
      REPORT_PATH: '{{.REPORT_PATH | default "Reports/NakamaTest"}}'
    deps:
    - task: check-unreal-engine
    - task: start-nakama
    cmds:
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            echo "Set it in .env or pass it as an argument:"
            echo "  task test-unreal UNREAL_ENGINE=/path/to/engine"
            exit 1
        fi

        PROJECT="$(pwd)/NakamaTest/NakamaTest.uproject"
        REPORT_DIR="$(pwd)/{{.REPORT_PATH}}"
        LOG_FILE="$REPORT_DIR/unreal.log"

        mkdir -p "$REPORT_DIR"

        echo "Building NakamaTest..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/Build.bat" \
            NakamaTestEditor Win64 Development \
            -Project="$PROJECT"

        if [ $? -ne 0 ]; then
            echo "Build failed!"
            exit 1
        fi

        echo "Running automation suite {{.TEST_SUITE}}..."
        "$UNREAL_ENGINE/Engine/Binaries/Win64/UnrealEditor-Cmd.exe" \
            "$PROJECT" \
            -nullrhi \
            -stdout \
            -FullStdOutLogOutput \
            -forcelogflush \
            -nosplash \
            -buildmachine \
            -unattended \
            -nopause \
            -nosound \
            -abslog="$LOG_FILE" \
            -ReportOutputPath="$REPORT_DIR" \
            -ExecCmds="Automation RunTests {{.TEST_SUITE}}; Quit"
      platforms: [windows]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            echo "Set it in .env or pass it as an argument:"
            echo "  task test-unreal UNREAL_ENGINE=/path/to/engine"
            exit 1
        fi

        PROJECT="$(pwd)/NakamaTest/NakamaTest.uproject"
        REPORT_DIR="$(pwd)/{{.REPORT_PATH}}"
        LOG_FILE="$REPORT_DIR/unreal.log"

        mkdir -p "$REPORT_DIR"

        echo "Running automation suite {{.TEST_SUITE}}..."
        "$UNREAL_ENGINE/Engine/Binaries/Mac/UnrealEditor.app/Contents/MacOS/UnrealEditor" \
            "$PROJECT" \
            -nullrhi \
            -stdout \
            -FullStdOutLogOutput \
            -forcelogflush \
            -nosplash \
            -buildmachine \
            -unattended \
            -nopause \
            -nosound \
            -abslog="$LOG_FILE" \
            -ReportOutputPath="$REPORT_DIR" \
            -ExecCmds="Automation RunTests {{.TEST_SUITE}}; Quit"
      platforms: [darwin, linux]

  check-unreal-engine:
    desc: 'Check or auto-detect UNREAL_ENGINE environment variable.'
    cmds:
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "UNREAL_ENGINE not set, searching for Unreal Engine installations..."

            FOUND=""
            # macOS: use mdfind (Spotlight)
            if command -v mdfind &> /dev/null; then
                CANDIDATE=$(mdfind -name "RunUAT.sh" 2>/dev/null | grep "Engine/Build/BatchFiles/RunUAT.sh" | head -1)
                if [ -n "$CANDIDATE" ]; then
                    FOUND="${CANDIDATE%/Engine/Build/BatchFiles/RunUAT.sh}"
                fi
            # Linux: use locate
            elif command -v locate &> /dev/null; then
                CANDIDATE=$(locate "Engine/Build/BatchFiles/RunUAT.sh" 2>/dev/null | head -1)
                if [ -n "$CANDIDATE" ]; then
                    FOUND="${CANDIDATE%/Engine/Build/BatchFiles/RunUAT.sh}"
                fi
            fi

            if [ -z "$FOUND" ]; then
                echo "Error: Could not find Unreal Engine installation!"
                echo ""
                echo "Set UNREAL_ENGINE manually in .env file:"
                echo "  echo 'UNREAL_ENGINE=/path/to/UnrealEngine' >> .env"
                exit 1
            fi

            echo "Found Unreal Engine at: $FOUND"
            echo "Saving to .env file..."
            echo "UNREAL_ENGINE=$FOUND" >> .env
            export UNREAL_ENGINE="$FOUND"
        fi
        echo "UNREAL_ENGINE=$UNREAL_ENGINE"
      platforms: [darwin, linux]
    - cmd: |
        powershell -NoProfile -Command "& {
          if (-not \$env:UNREAL_ENGINE) {
            Write-Host 'UNREAL_ENGINE not set, searching for Unreal Engine installations...'

            \$searchPaths = @(
              'C:\Program Files\Epic Games',
              'D:\Program Files\Epic Games',
              'E:\Program Files\Epic Games',
              \"\$env:USERPROFILE\UnrealEngine\"
            )

            \$found = \$null
            foreach (\$basePath in \$searchPaths) {
              if (Test-Path \$basePath) {
                \$candidates = Get-ChildItem -Path \$basePath -Directory -Filter 'UE_*' -ErrorAction SilentlyContinue | Sort-Object Name -Descending
                foreach (\$candidate in \$candidates) {
                  \$uatPath = Join-Path \$candidate.FullName 'Engine\Build\BatchFiles\RunUAT.bat'
                  if (Test-Path \$uatPath) {
                    \$found = \$candidate.FullName
                    break
                  }
                }
                if (\$found) { break }
              }
            }

            if (-not \$found) {
              Write-Host 'Error: Could not find Unreal Engine installation!'
              Write-Host ''
              Write-Host 'Please set UNREAL_ENGINE in .env file:'
              Write-Host '  echo UNREAL_ENGINE=C:\Path\To\UE_5.x >> .env'
              Write-Host ''
              Write-Host 'Or pass it as an argument:'
              Write-Host '  task test-unreal UNREAL_ENGINE=C:\Path\To\UE_5.x'
              exit 1
            }

            Write-Host \"Found Unreal Engine at: \$found\"
            Write-Host 'Saving to .env file...'
            Add-Content -Path '.env' -Value \"UNREAL_ENGINE=\$found\"
            \$env:UNREAL_ENGINE = \$found
          }
          Write-Host \"UNREAL_ENGINE=\$env:UNREAL_ENGINE\"
        }"
      platforms: [windows]

  generate:
    desc: 'Generate all Nakama modules from protobuf schemas.'
    cmds:
    - task: build
    - cmd: |
        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama-api.ue.h.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/NakamaApi/Public/NakamaApi.h

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama-api.ue.cpp.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/NakamaApi/Private/NakamaApi.cpp

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama-unreal.ue.h.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/NakamaUnreal/Public/NakamaUnreal.h

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama-unreal.ue.cpp.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/NakamaUnreal/Private/NakamaUnreal.cpp

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama-client-bplib.ue.h.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/NakamaBlueprints/Public/NakamaClientBlueprintLibrary.h

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama-client-bplib.ue.cpp.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/NakamaBlueprints/Private/NakamaClientBlueprintLibrary.cpp

  generate-debug:
    desc: 'Debug Codegen parsed info.'
    cmds:
    - task: build
    - task: run-codegen
      vars:
        TEMPLATE_FILE: cmd/codegen/templates/debug.tmpl

  build:
    desc: 'Build the codegen tool.'
    dir: cmd/codegen
    cmds:
    - cmd: mkdir ../../build
      ignore_error: true
    - cmd: go build -o ../../{{.CODEGEN}}

