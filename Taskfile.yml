version: '3'

silent: true
dotenv: ['.env']

vars:
  PROTO_FILE: "proto/nakama-types.proto"
  PROTO_SERVICE_FILE: "proto/nakama-api.proto"
  PROTO_RT_FILE: "proto/realtime.proto"
  SATORI_PROTO_FILE: "proto/satori-types.proto"
  SATORI_PROTO_SERVICE_FILE: "proto/satori-api.proto"
  CODEGEN: 'build/codegen{{if eq OS "windows"}}.exe{{end}}'

tasks:


  codegen:
    desc: 'Fetch protos, build codegen tool, and generate all Nakama + Satori modules.'
    vars:
      PROTO_API_URL: 'https://raw.githubusercontent.com/heroiclabs/nakama-common/feat/flatten-proto-v2/api/api.proto'
      PROTO_SERVICE_URL: 'https://raw.githubusercontent.com/heroiclabs/nakama/feat/flatten-proto/apigrpc/apigrpc.proto'
      PROTO_RT_URL: 'https://raw.githubusercontent.com/heroiclabs/nakama-common/feat/flatten-proto-v2/rtapi/realtime.proto'
    cmds:
    - cmd: |
        mkdir -p build
        cd cmd/codegen && go build -o ../../{{.CODEGEN}} && cd ../..

        mkdir -p proto Satori/Source/SatoriApi/Public Satori/Source/SatoriApi/Private

        curl -o {{.PROTO_FILE}} "{{.PROTO_API_URL}}"
        curl -o {{.PROTO_SERVICE_FILE}} "{{.PROTO_SERVICE_URL}}"
        curl -o {{.PROTO_RT_FILE}} "{{.PROTO_RT_URL}}"

        git clone --depth 1 --branch feat/reorder-proto --filter=blob:none --sparse git@github.com:heroiclabs/satori.git proto/satori 2>/dev/null
        cd proto/satori && git sparse-checkout set api 2>/dev/null && cd -
        cp proto/satori/api/satori-types.proto {{.SATORI_PROTO_FILE}}
        cp proto/satori/api/satori-api.proto {{.SATORI_PROTO_SERVICE_FILE}}
        rm -rf proto/satori

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama-api.ue.h.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/NakamaApi/Public/NakamaApi.h

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama-api.ue.cpp.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/NakamaApi/Private/NakamaApi.cpp

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama.ue.h.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/Nakama/Public/Nakama.h

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama.ue.cpp.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/Nakama/Private/Nakama.cpp

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama-client-bplib.ue.h.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/NakamaBlueprints/Public/NakamaClientBlueprintLibrary.h

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/nakama-client-bplib.ue.cpp.tmpl \
        --proto {{.PROTO_FILE}} \
        --proto {{.PROTO_SERVICE_FILE}} \
        > Nakama/Source/NakamaBlueprints/Private/NakamaClientBlueprintLibrary.cpp

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/satori-api.ue.h.tmpl \
        --proto {{.SATORI_PROTO_FILE}} \
        --proto {{.SATORI_PROTO_SERVICE_FILE}} \
        --prefix FSatori \
        > Satori/Source/SatoriApi/Public/SatoriApi.h

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/satori-api.ue.cpp.tmpl \
        --proto {{.SATORI_PROTO_FILE}} \
        --proto {{.SATORI_PROTO_SERVICE_FILE}} \
        --prefix FSatori \
        > Satori/Source/SatoriApi/Private/SatoriApi.cpp

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/satori.ue.h.tmpl \
        --proto {{.SATORI_PROTO_FILE}} \
        --proto {{.SATORI_PROTO_SERVICE_FILE}} \
        --prefix FSatori \
        > Satori/Source/Satori/Public/Satori.h

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/satori.ue.cpp.tmpl \
        --proto {{.SATORI_PROTO_FILE}} \
        --proto {{.SATORI_PROTO_SERVICE_FILE}} \
        --prefix FSatori \
        > Satori/Source/Satori/Private/Satori.cpp

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/satori-client-bplib.ue.h.tmpl \
        --proto {{.SATORI_PROTO_FILE}} \
        --proto {{.SATORI_PROTO_SERVICE_FILE}} \
        --prefix FSatori \
        > Satori/Source/SatoriBlueprints/Public/SatoriClientBlueprintLibrary.h

        ./{{.CODEGEN}} \
        --template cmd/codegen/templates/satori-client-bplib.ue.cpp.tmpl \
        --proto {{.SATORI_PROTO_FILE}} \
        --proto {{.SATORI_PROTO_SERVICE_FILE}} \
        --prefix FSatori \
        > Satori/Source/SatoriBlueprints/Private/SatoriClientBlueprintLibrary.cpp

  start-nakama:
    desc: 'Start Nakama server with PostgreSQL via Docker Compose (skipped if already healthy).'
    cmds:
    - cmd: |
        if docker exec unreal_integration_test_nakama /nakama/nakama healthcheck 2>/dev/null; then
          echo "Nakama is already running."
          exit 0
        fi

        docker compose -f IntegrationTests/server/docker-compose.yml up --build -d
        echo "Waiting for Nakama to be healthy..."
        timeout=60
        while [ $timeout -gt 0 ]; do
          if docker exec unreal_integration_test_nakama /nakama/nakama healthcheck 2>/dev/null; then
            echo "Nakama is ready!"
            exit 0
          fi
          powershell -NoProfile -Command "Start-Sleep -Seconds 2" 2>/dev/null || sleep 2
          timeout=$((timeout - 2))
        done
        echo "Error: Nakama failed to start within 60 seconds"
        docker compose -f IntegrationTests/server/docker-compose.yml logs nakama
        exit 1

  build:
    desc: 'Build and cook a project via UAT (BuildCookRun).'
    deps:
    - task: check-unreal-engine
    vars:
      PROJECT: '{{.PROJECT}}'
      CONFIG: '{{.CONFIG | default "Development"}}'
    cmds:
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi
        if [ -z "{{.PROJECT}}" ]; then
            echo "Error: PROJECT is required. Example:"
            echo "  task build-project PROJECT=NakamaBlueprintsDemo/NakamaBlueprintsDemo.uproject"
            exit 1
        fi

        PROJECT="$(pwd)/{{.PROJECT}}"

        echo "Building project $PROJECT ({{.CONFIG}})..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.bat" \
            BuildCookRun \
            -Platform=Win64 \
            -Project="$PROJECT" \
            -ClientConfig={{.CONFIG}} \
            -Cook -Build
      platforms: [windows]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi
        if [ -z "{{.PROJECT}}" ]; then
            echo "Error: PROJECT is required. Example:"
            echo "  task build-project PROJECT=NakamaBlueprintsDemo/NakamaBlueprintsDemo.uproject"
            exit 1
        fi

        PROJECT="$(pwd)/{{.PROJECT}}"

        echo "Building project $PROJECT ({{.CONFIG}})..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.sh" \
            BuildCookRun \
            -Platform=Mac \
            -Project="$PROJECT" \
            -ClientConfig={{.CONFIG}} \
            -Cook -Build \
            -Architecture_Mac=arm64
      platforms: [darwin]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            exit 1
        fi
        if [ -z "{{.PROJECT}}" ]; then
            echo "Error: PROJECT is required. Example:"
            echo "  task build-project PROJECT=NakamaBlueprintsDemo/NakamaBlueprintsDemo.uproject"
            exit 1
        fi

        PROJECT="$(pwd)/{{.PROJECT}}"

        echo "Building project $PROJECT ({{.CONFIG}})..."
        "$UNREAL_ENGINE/Engine/Build/BatchFiles/RunUAT.sh" \
            BuildCookRun \
            -Platform=Linux \
            -Project="$PROJECT" \
            -ClientConfig={{.CONFIG}} \
            -Cook -Build
      platforms: [linux]

  check-unreal-engine:
    desc: 'Check or auto-detect UNREAL_ENGINE environment variable.'
    cmds:
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "UNREAL_ENGINE not set, searching for Unreal Engine installations..."

            FOUND=""
            # macOS: use mdfind (Spotlight)
            if command -v mdfind &> /dev/null; then
                CANDIDATE=$(mdfind -name "RunUAT.sh" 2>/dev/null | grep "Engine/Build/BatchFiles/RunUAT.sh" | head -1)
                if [ -n "$CANDIDATE" ]; then
                    FOUND="${CANDIDATE%/Engine/Build/BatchFiles/RunUAT.sh}"
                fi
            # Linux: use locate
            elif command -v locate &> /dev/null; then
                CANDIDATE=$(locate "Engine/Build/BatchFiles/RunUAT.sh" 2>/dev/null | head -1)
                if [ -n "$CANDIDATE" ]; then
                    FOUND="${CANDIDATE%/Engine/Build/BatchFiles/RunUAT.sh}"
                fi
            fi

            if [ -z "$FOUND" ]; then
                echo "Error: Could not find Unreal Engine installation!"
                echo ""
                echo "Set UNREAL_ENGINE manually in .env file:"
                echo "  echo 'UNREAL_ENGINE=/path/to/UnrealEngine' >> .env"
                exit 1
            fi

            echo "Found Unreal Engine at: $FOUND"
            echo "Saving to .env file..."
            echo "UNREAL_ENGINE=$FOUND" >> .env
            export UNREAL_ENGINE="$FOUND"
        fi
        echo "UNREAL_ENGINE=$UNREAL_ENGINE"
      platforms: [darwin, linux]
    - cmd: |
        powershell -NoProfile -Command "& {
          if (-not \$env:UNREAL_ENGINE) {
            Write-Host 'UNREAL_ENGINE not set, searching for Unreal Engine installations...'

            \$searchPaths = @(
              'C:\Program Files\Epic Games',
              'D:\Program Files\Epic Games',
              'E:\Program Files\Epic Games',
              \"\$env:USERPROFILE\UnrealEngine\"
            )

            \$found = \$null
            foreach (\$basePath in \$searchPaths) {
              if (Test-Path \$basePath) {
                \$candidates = Get-ChildItem -Path \$basePath -Directory -Filter 'UE_*' -ErrorAction SilentlyContinue | Sort-Object Name -Descending
                foreach (\$candidate in \$candidates) {
                  \$uatPath = Join-Path \$candidate.FullName 'Engine\Build\BatchFiles\RunUAT.bat'
                  if (Test-Path \$uatPath) {
                    \$found = \$candidate.FullName
                    break
                  }
                }
                if (\$found) { break }
              }
            }

            if (-not \$found) {
              Write-Host 'Error: Could not find Unreal Engine installation!'
              Write-Host ''
              Write-Host 'Please set UNREAL_ENGINE in .env file:'
              Write-Host '  echo UNREAL_ENGINE=C:\Path\To\UE_5.x >> .env'
              Write-Host ''
              Write-Host 'Or pass it as an argument:'
              Write-Host '  task test-unreal UNREAL_ENGINE=C:\Path\To\UE_5.x'
              exit 1
            }

            Write-Host \"Found Unreal Engine at: \$found\"
            Write-Host 'Saving to .env file...'
            Add-Content -Path '.env' -Value \"UNREAL_ENGINE=\$found\"
            \$env:UNREAL_ENGINE = \$found
          }
          Write-Host \"UNREAL_ENGINE=\$env:UNREAL_ENGINE\"
        }"
      platforms: [windows]

  test-unreal:
    desc: 'Build and run IntegrationTests C++ automation suite.'
    vars:
      TEST_SUITE: '{{.TEST_SUITE | default "IntegrationTests.Auth"}}'
      REPORT_PATH: '{{.REPORT_PATH | default "Reports/IntegrationTests"}}'
    cmds:
    - task: check-unreal-engine
    - task: codegen
    - task: start-nakama
    - cmd: |
        if [ ! -d "IntegrationTests/Plugins/Nakama" ]; then
            mkdir -p IntegrationTests/Plugins
            if command -v powershell &>/dev/null; then
                powershell -NoProfile -Command "New-Item -ItemType Junction -Force -Path 'IntegrationTests\Plugins\Nakama' -Target (Join-Path (Get-Location) 'Nakama') | Out-Null"
            else
                ln -sfn "$(pwd)/Nakama" "IntegrationTests/Plugins/Nakama"
            fi
        fi
    - cmd: |
        PROJECT="$(pwd)/IntegrationTests/IntegrationTests.uproject"
        REPORT_DIR="$(pwd)/{{.REPORT_PATH}}"
        LOG_FILE="$REPORT_DIR/unreal.log"

        mkdir -p "$REPORT_DIR"

        "$UNREAL_ENGINE/Engine/Build/BatchFiles/Build.bat" \
            IntegrationTestsEditor Win64 Development \
            -Project="$PROJECT"

        if [ $? -ne 0 ]; then
            echo "Build failed!"
            exit 1
        fi

        "$UNREAL_ENGINE/Engine/Binaries/Win64/UnrealEditor-Cmd.exe" \
            "$PROJECT" \
            -nullrhi \
            -stdout \
            -FullStdOutLogOutput \
            -forcelogflush \
            -nosplash \
            -buildmachine \
            -unattended \
            -nopause \
            -nosound \
            -abslog="$LOG_FILE" \
            -ReportOutputPath="$REPORT_DIR" \
            -ExecCmds="Automation RunTests {{.TEST_SUITE}}; Quit"
      platforms: [windows]
    - cmd: |
        if [ -z "$UNREAL_ENGINE" ]; then
            echo "Error: UNREAL_ENGINE is not set!"
            echo "Set it in .env or pass it as an argument:"
            echo "  task test-unreal UNREAL_ENGINE=/path/to/engine"
            exit 1
        fi

        PROJECT="$(pwd)/IntegrationTests/IntegrationTests.uproject"
        REPORT_DIR="$(pwd)/{{.REPORT_PATH}}"
        LOG_FILE="$REPORT_DIR/unreal.log"

        mkdir -p "$REPORT_DIR"

        echo "Running automation suite {{.TEST_SUITE}}..."
        "$UNREAL_ENGINE/Engine/Binaries/Mac/UnrealEditor.app/Contents/MacOS/UnrealEditor" \
            "$PROJECT" \
            -nullrhi \
            -stdout \
            -FullStdOutLogOutput \
            -forcelogflush \
            -nosplash \
            -buildmachine \
            -unattended \
            -nopause \
            -nosound \
            -abslog="$LOG_FILE" \
            -ReportOutputPath="$REPORT_DIR" \
            -ExecCmds="Automation RunTests {{.TEST_SUITE}}; Quit"
      platforms: [darwin, linux]
