version: '3'

vars:
  PROTO_FILE: "proto/nakama-types.proto"
  PROTO_SERVICE_FILE: "proto/nakama-api.proto"
  BIN_PATH: "build/codegen"

tasks:
  generate-ue-client-h:
    desc: 'Generate UE Nakama Client Header file.'
    cmds:
    - task: build
    - task: run-codegen
      vars:
        TEMPLATE_FILE: templates/nakama-client-bplib.ue.h.tmpl

  generate-ue-client-cpp:
    desc: 'Generate UE Nakama Client Source file.'
    cmds:
    - task: build
    - task: run-codegen
      vars:
        TEMPLATE_FILE: templates/nakama-client-bplib.ue.cpp.tmpl

  generate-debug:
    desc: 'Debug Codegen parsed info.'
    cmds:
    - task: build
    - task: run-codegen
      vars:
        TEMPLATE_FILE: templates/debug.tmpl

  build:
    desc: 'Build the codegen tool.'
    cmds:
    - cmd: |
        go build -o {{.BIN_PATH}} 

  fetch-protos:
    desc: 'Fetch .proto files from Nakama.'
    cmds:
    - cmd: |
        curl -o {{.PROTO_SERVICE_FILE}} https://raw.githubusercontent.com/heroiclabs/nakama/master/apigrpc/apigrpc.proto
        curl -o {{.PROTO_FILE}} https://raw.githubusercontent.com/heroiclabs/nakama-common/master/api/api.proto

  run-codegen:
    desc: 'Fetch Nakama proto schemas and run codegen.'
    cmds:
    - task: fetch-protos
    - cmd: |
        {{.BIN_PATH}} \
        --template {{.TEMPLATE_FILE}} \
        --proto {{.PROTO_FILE}} \
        --proto-service {{.PROTO_SERVICE_FILE}}

