# =============================================================================
# dict.conf — Unreal C++ type-trait dictionary for the codegen Presenter.
#
# Each section maps one or more proto type names to a set of pure traits.
# The Presenter (presenter.go) looks up these traits by proto type name and
# stamps them onto UeParam / UnrealHttpViewModel — NO C++ snippets are
# constructed inside Go code; the templates read the traits directly.
#
# Trait catalogue
# ---------------
#   ue_type              Unreal scalar type (e.g. FString, int32, bool)
#   repeated_ue_type     TArray wrapper for the scalar type
#   ue_map_type          TMap<FString, T> for map<string, T> fields
#   ue_param             Pass-by type used in function signatures (scalar/message)
#   repeated_ue_param    Pass-by type for repeated fields (const TArray<T>&)
#   ue_map_param         Pass-by type for map fields (const TMap<FString, T>&)
#   is_primitive         "true" if the type is a scalar/primitive (not a message)
#   empty_check          Non-empty guard expression token: "IsEmpty" | "NonZero" | "None"
#                        Templates expand these to !X.IsEmpty(), X != 0, (nothing) etc.
#   json_method          SetXxxField suffix: "String" | "Number" | "Bool" | "Object"
#   json_array_value     FJsonValueXxx class: "String" | "Number" | "Boolean" | "Object"
#   query_format         Printf verb for query-string building: "%s" | "%d" | "%lld" | "%s_bool"
#                        Templates treat "%s_bool" as the bool ternary pattern.
#   json_from_method     Unreal JSON getter for FromJson: "GetStringField" | "GetIntegerField" |
#                        "GetNumberField" | "GetBoolField"
#   cast_from_json       Optional C++ cast wrapper applied when reading from JSON:
#                        "static_cast<int32>" | "static_cast<int64>" | etc.
#                        Empty string means no cast needed.
# =============================================================================

# ---------------------------------------------------------------------------
# string  /  google.protobuf.StringValue
# ---------------------------------------------------------------------------
[ "string", "google.protobuf.StringValue" ]
  ue_type              = "FString"
  repeated_ue_type     = "TArray<FString>"
  ue_map_type          = "TMap<FString, FString>"
  ue_param             = "const FString&"
  repeated_ue_param    = "const TArray<FString>&"
  ue_map_param         = "const TMap<FString, FString>&"
  is_primitive         = "true"
  empty_check          = "IsEmpty"
  json_method          = "String"
  json_array_value     = "String"
  query_format         = "%s"
  json_from_method     = "GetStringField"
  cast_from_json       = ""

# ---------------------------------------------------------------------------
# google.protobuf.Timestamp  — stored as FString (ISO-8601)
# ---------------------------------------------------------------------------
[ "google.protobuf.Timestamp" ]
  ue_type              = "FString"
  repeated_ue_type     = "TArray<FString>"
  ue_map_type          = "TMap<FString, FString>"
  ue_param             = "const FString&"
  repeated_ue_param    = "const TArray<FString>&"
  ue_map_param         = "const TMap<FString, FString>&"
  is_primitive         = "true"
  empty_check          = "IsEmpty"
  json_method          = "String"
  json_array_value     = "String"
  query_format         = "%s"
  json_from_method     = "GetStringField"
  cast_from_json       = ""

# ---------------------------------------------------------------------------
# bool  /  google.protobuf.BoolValue
# ---------------------------------------------------------------------------
[ "bool", "google.protobuf.BoolValue" ]
  ue_type              = "bool"
  repeated_ue_type     = "TArray<bool>"
  ue_map_type          = "TMap<FString, bool>"
  ue_param             = "bool"
  repeated_ue_param    = "const TArray<bool>&"
  ue_map_param         = "const TMap<FString, bool>&"
  is_primitive         = "true"
  empty_check          = "None"
  json_method          = "Bool"
  json_array_value     = "Boolean"
  query_format         = "%s_bool"
  json_from_method     = "GetBoolField"
  cast_from_json       = ""

# ---------------------------------------------------------------------------
# int32  /  google.protobuf.Int32Value
# ---------------------------------------------------------------------------
[ "int32", "google.protobuf.Int32Value" ]
  ue_type              = "int32"
  repeated_ue_type     = "TArray<int32>"
  ue_map_type          = "TMap<FString, int32>"
  ue_param             = "int32"
  repeated_ue_param    = "const TArray<int32>&"
  ue_map_param         = "const TMap<FString, int32>&"
  is_primitive         = "true"
  empty_check          = "NonZero"
  json_method          = "Number"
  json_array_value     = "Number"
  query_format         = "%d"
  json_from_method     = "GetIntegerField"
  cast_from_json       = ""

# ---------------------------------------------------------------------------
# uint32  /  google.protobuf.UInt32Value
# Blueprint doesn't support uint32; map to int32.
# ---------------------------------------------------------------------------
[ "uint32", "google.protobuf.UInt32Value" ]
  ue_type              = "int32"
  repeated_ue_type     = "TArray<int32>"
  ue_map_type          = "TMap<FString, int32>"
  ue_param             = "int32"
  repeated_ue_param    = "const TArray<int32>&"
  ue_map_param         = "const TMap<FString, int32>&"
  is_primitive         = "true"
  empty_check          = "NonZero"
  json_method          = "Number"
  json_array_value     = "Number"
  query_format         = "%d"
  json_from_method     = "GetNumberField"
  cast_from_json       = "static_cast<uint32>"

# ---------------------------------------------------------------------------
# int64  /  google.protobuf.Int64Value
# ---------------------------------------------------------------------------
[ "int64", "google.protobuf.Int64Value" ]
  ue_type              = "int64"
  repeated_ue_type     = "TArray<int64>"
  ue_map_type          = "TMap<FString, int64>"
  ue_param             = "int64"
  repeated_ue_param    = "const TArray<int64>&"
  ue_map_param         = "const TMap<FString, int64>&"
  is_primitive         = "true"
  empty_check          = "NonZero"
  json_method          = "Number"
  json_array_value     = "Number"
  query_format         = "%lld"
  json_from_method     = "GetNumberField"
  cast_from_json       = "static_cast<int64>"

# ---------------------------------------------------------------------------
# uint64  /  google.protobuf.UInt64Value
# Blueprint doesn't support uint64; map to int64.
# ---------------------------------------------------------------------------
[ "uint64", "google.protobuf.UInt64Value" ]
  ue_type              = "int64"
  repeated_ue_type     = "TArray<int64>"
  ue_map_type          = "TMap<FString, int64>"
  ue_param             = "int64"
  repeated_ue_param    = "const TArray<int64>&"
  ue_map_param         = "const TMap<FString, int64>&"
  is_primitive         = "true"
  empty_check          = "NonZero"
  json_method          = "Number"
  json_array_value     = "Number"
  query_format         = "%lld"
  json_from_method     = "GetNumberField"
  cast_from_json       = "static_cast<uint64>"

# ---------------------------------------------------------------------------
# float  /  google.protobuf.FloatValue
# ---------------------------------------------------------------------------
[ "float", "google.protobuf.FloatValue" ]
  ue_type              = "float"
  repeated_ue_type     = "TArray<float>"
  ue_map_type          = "TMap<FString, float>"
  ue_param             = "float"
  repeated_ue_param    = "const TArray<float>&"
  ue_map_param         = "const TMap<FString, float>&"
  is_primitive         = "true"
  empty_check          = "NonZero"
  json_method          = "Number"
  json_array_value     = "Number"
  query_format         = "%f"
  json_from_method     = "GetNumberField"
  cast_from_json       = ""

# ---------------------------------------------------------------------------
# double  /  google.protobuf.DoubleValue
# ---------------------------------------------------------------------------
[ "double", "google.protobuf.DoubleValue" ]
  ue_type              = "double"
  repeated_ue_type     = "TArray<double>"
  ue_map_type          = "TMap<FString, double>"
  ue_param             = "double"
  repeated_ue_param    = "const TArray<double>&"
  ue_map_param         = "const TMap<FString, double>&"
  is_primitive         = "true"
  empty_check          = "NonZero"
  json_method          = "Number"
  json_array_value     = "Number"
  query_format         = "%f"
  json_from_method     = "GetNumberField"
  cast_from_json       = ""

# ---------------------------------------------------------------------------
# bytes  /  google.protobuf.BytesValue
# Stored as raw byte array; no query-param support.
# ---------------------------------------------------------------------------
[ "bytes", "google.protobuf.BytesValue" ]
  ue_type              = "TArray<uint8>"
  repeated_ue_type     = "TArray<TArray<uint8>>"
  ue_map_type          = "TMap<FString, TArray<uint8>>"
  ue_param             = "const TArray<uint8>&"
  repeated_ue_param    = "const TArray<TArray<uint8>>&"
  ue_map_param         = "const TMap<FString, TArray<uint8>>&"
  is_primitive         = "true"
  empty_check          = "NumEmpty"
  json_method          = "String"
  json_array_value     = "String"
  query_format         = "%s"
  json_from_method     = "GetStringField"
  cast_from_json       = ""

# ---------------------------------------------------------------------------
# Enum  (sentinel entry — real enum names are resolved dynamically by the
#        Presenter; this entry provides default traits for any enum type)
# ---------------------------------------------------------------------------
[ "__enum__" ]
  ue_type              = "int32"
  repeated_ue_type     = "TArray<int32>"
  ue_map_type          = "TMap<FString, int32>"
  ue_param             = "int32"
  repeated_ue_param    = "const TArray<int32>&"
  ue_map_param         = "const TMap<FString, int32>&"
  is_primitive         = "true"
  empty_check          = "NonZero"
  json_method          = "Number"
  json_array_value     = "Number"
  query_format         = "%d"
  json_from_method     = "GetIntegerField"
  cast_from_json       = ""

# ---------------------------------------------------------------------------
# Message  (sentinel entry — real message names are resolved dynamically by
#           the Presenter; this entry provides default traits for any message)
# ---------------------------------------------------------------------------
[ "__message__" ]
  ue_type              = ""
  repeated_ue_type     = ""
  ue_map_type          = ""
  ue_param             = ""
  repeated_ue_param    = ""
  ue_map_param         = ""
  is_primitive         = "false"
  empty_check          = "None"
  json_method          = "Object"
  json_array_value     = "Object"
  query_format         = ""
  json_from_method     = "TryGetObjectField"
  cast_from_json       = ""
