services:
  postgres:
    container_name: unreal_integration_test_postgres
    image: timescale/timescaledb-ha:pg17.6-ts2.21.4-all
    platform: "linux/amd64"
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_PASSWORD=localdb
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "nakama" ]
      interval: 3s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  nakama:
    container_name: unreal_integration_test_nakama
    build:
      context: .
      args:
        NAKAMA_VERSION: "3.36.0"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama --database.address postgres:localdb@postgres:5432/nakama
    expose:
      - "7349"
      - "7350"
      - "7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    links:
      - "postgres:db"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    restart: unless-stopped

  satori:
    container_name: unreal_integration_test_satori
    build:
      context: ${SATORI_PATH:-../../../satori}
      dockerfile_inline: |
        FROM golang:1.25.5-trixie AS builder
        ENV CGO_ENABLED=1
        RUN apt-get update && apt-get install -y --no-install-recommends postgresql-client && rm -rf /var/lib/apt/lists/*
        WORKDIR /satori
        COPY go.mod go.sum ./
        RUN go mod download
        COPY . .
        RUN go build --trimpath -buildvcs=false -o ./satori
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /satori/satori timescale-cont-agg pause --database.address postgres:localdb@postgres:5432/satori &&
        /satori/satori migrate up --database.address postgres:localdb@postgres:5432/satori &&
        /satori/satori timescale-cont-agg resume --database.address postgres:localdb@postgres:5432/satori &&
        PGPASSWORD=localdb psql -h postgres -U postgres -d satori -c "INSERT INTO api_key (name, value) VALUES ('default', 'defaultkey') ON CONFLICT (name) DO UPDATE SET value = 'defaultkey';" &&
        PGPASSWORD=localdb psql -h postgres -U postgres -d satori -c "INSERT INTO event_configuration (name) VALUES ('game_start'),('level_complete'),('purchase') ON CONFLICT (name) DO NOTHING;" &&
        PGPASSWORD=localdb psql -h postgres -U postgres -d satori -c "INSERT INTO property_configuration (name) VALUES ('level'),('rank') ON CONFLICT (name) DO NOTHING;" &&
        exec /satori/satori --database.address postgres:localdb@postgres:5432/satori --logger.level DEBUG --metrics.prometheus_port 0
    expose:
      - "7450"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7450/" ]
      interval: 10s
      timeout: 5s
      retries: 5
    links:
      - "postgres:db"
    ports:
      - "7450:7450"
    restart: unless-stopped

volumes:
  data:
